<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم صوتي</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
        color: white;
        text-align: center;
    }

    header {
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        background: rgba(0,0,0,0.3);
    }

    select, button {
        padding: 10px;
        margin: 10px;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }

    select {
        width: 80%;
    }

    button {
        background: #00c853;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #00e676;
    }

    .container {
        padding: 20px;
    }

    .surah-list {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding: 10px;
        scroll-behavior: smooth;
    }

    .surah {
        min-width: 120px;
        background: rgba(255,255,255,0.1);
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
    }

    .surah:hover {
        background: rgba(255,255,255,0.3);
    }

    audio {
        width: 90%;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>📖 القرآن الكريم صوتي</header>

<div class="container">

    <!-- اختيار الشيخ -->
    <select id="reciter">
        <option value="abdulbasit">عبدالباسط عبدالصمد</option>
        <option value="mishary">مشاري العفاسي</option>
        <option value="alafasy">ماهر المعيقلي</option>
        <option value="minshawi">محمد صديق المنشاوي</option>
        <option value="hosary">محمود خليل الحصري</option>
        <option value="ghamidi">سعد الغامدي</option>
        <option value="shuraim">سعود الشريم</option>
        <option value="ajmi">أحمد العجمي</option>
        <option value="hudhaify">علي الحذيفي</option>
        <option value="basfar">صلاح البدير</option>

        <!-- ضفت لك مجموعة كبيرة (تقدر تكملهم بنفس الشكل) -->
        <option value="reciter11">قارئ 11</option>
        <option value="reciter12">قارئ 12</option>
        <option value="reciter13">قارئ 13</option>
        <option value="reciter14">قارئ 14</option>
        <option value="reciter15">قارئ 15</option>
        <option value="reciter16">قارئ 16</option>
        <option value="reciter17">قارئ 17</option>
        <option value="reciter18">قارئ 18</option>
        <option value="reciter19">قارئ 19</option>
        <option value="reciter20">قارئ 20</option>
        <!-- تقدر توصل لـ 50 بسهولة -->
    </select>

    <!-- السور -->
    <div class="surah-list" id="surahs"></div>

    <!-- مشغل الصوت -->
    <audio id="player" controls></audio>

</div>

<script>
const surahs = [
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق"
];

// روابط تجريبية (تقدر تغيرها حسب الشيخ)
const baseUrls = {
    abdulbasit: "https://server8.mp3quran.net/abdurrahman/",
    mishary: "https://server8.mp3quran.net/afs/",
    alafasy: "https://server8.mp3quran.net/maher/",
    minshawi: "https://server8.mp3quran.net/minsh/",
    hosary: "https://server8.mp3quran.net/husr/",
    ghamidi: "https://server8.mp3quran.net/s_gmd/",
    shuraim: "https://server8.mp3quran.net/shur/",
    ajmi: "https://server8.mp3quran.net/ahmed/",
    hudhaify: "https://server8.mp3quran.net/hudhaify/",
    basfar: "https://server8.mp3quran.net/sbasfar/"
};

// إنشاء السور
const surahContainer = document.getElementById("surahs");

surahs.forEach((name, index) => {
    let div = document.createElement("div");
    div.className = "surah";
    div.innerText = name;
    div.onclick = () => playSurah(index + 1);
    surahContainer.appendChild(div);
});

function playSurah(number) {
    let reciter = document.getElementById("reciter").value;
    let player = document.getElementById("player");

    let base = baseUrls[reciter] || baseUrls["mishary"];

    let surahNum = number.toString().padStart(3, '0');

    let url = base + surahNum + ".mp3";

    player.src = url;
    player.play();
}
</script>

</body>
</html>
